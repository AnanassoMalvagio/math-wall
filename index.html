<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Math Arkanoid</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;touch-action:none;user-select:none}
canvas{display:block;cursor:none;width:100%;max-width:600px;height:auto;touch-action:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = 600;
canvas.height = 710;
const W = canvas.width, H = canvas.height;

// ── Layout ────────────────────────────────────────────────────────────────
const HUD_H = 48;
const GAME_TOP = HUD_H;
const GAME_BOTTOM = 648;
const PADDLE_CY = 630;
const PADDLE_H = 14;
const PADDLE_W_BASE = 90;
const BALL_R = 8;
const BRICK_COLS = 10;
const BRICK_ROWS = 5;
const BRICK_W = 54;
const BRICK_H = 22;
const BRICK_GAP = 4;
const BRICK_SX = (W - (BRICK_COLS * BRICK_W + (BRICK_COLS - 1) * BRICK_GAP)) / 2;
const BRICK_SY = 58;
const PROB_Y = 660;

// ── Neon palette ──────────────────────────────────────────────────────────
const NEON = ['#ff0080','#00ff80','#0080ff','#ffff00','#ff8000','#ff00ff','#00ffff','#80ff00'];
const LEVEL_CLR = ['#00ffff','#ff00ff','#ffff00','#ff8800'];

// ── Audio ─────────────────────────────────────────────────────────────────
let AC;
function ac() { if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)(); return AC; }
function tone(freq, type, dur, vol=0.25, delay=0) {
  try {
    const a=ac(), o=a.createOscillator(), g=a.createGain();
    o.connect(g); g.connect(a.destination);
    o.type=type; o.frequency.value=freq;
    const t=a.currentTime+delay;
    g.gain.setValueAtTime(vol,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.start(t); o.stop(t+dur);
  } catch(e){}
}
const sfx = {
  bounce:  ()=>tone(220,'square',0.05,0.18),
  wrong:   ()=>tone(140,'sawtooth',0.12,0.2),
  correct: ()=>{tone(440,'square',0.1,0.3);tone(660,'square',0.1,0.3,0.1);tone(880,'square',0.15,0.3,0.22);},
  death:   ()=>{tone(300,'sawtooth',0.1,0.35);tone(180,'sawtooth',0.12,0.35,0.12);tone(90,'sawtooth',0.2,0.4,0.26);},
  levelup: ()=>[523,659,784,1047].forEach((f,i)=>tone(f,'square',0.2,0.3,i*0.13)),
  gameover:()=>{tone(200,'sawtooth',0.18,0.4);tone(150,'sawtooth',0.18,0.5,0.2);tone(100,'sawtooth',0.3,0.7,0.45);}
};

// ── State ─────────────────────────────────────────────────────────────────
let gs = 'menu'; // menu | playing | levelwin | gameover | victory
let score=0, lives=3, level=1;
let ball={}, paddle={}, bricks=[], particles=[];
let flashBricks={}, targetIdx=-1, problem={text:'',answer:0};
let pulse=0, screenFlash=0;
let keys={}, mouseX=W/2;
const SPEEDS = [3.5,4.5,5.5,7.0];

// ── Math generators ───────────────────────────────────────────────────────
function ri(a,b){return Math.floor(Math.random()*(b-a+1))+a;}

function gen1(){
  // ax + b = c, solve x
  const a=ri(1,4), x=ri(-5,8), b=ri(-5,5), c=a*x+b;
  const aS=a===1?'x':`${a}x`;
  let t;
  if(b===0)       t=`${aS} = ${c}`;
  else if(b>0)    t=`${aS} + ${b} = ${c}`;
  else            t=`${aS} - ${Math.abs(b)} = ${c}`;
  return {text:`${t},  x = ?`, answer:x};
}

function gen2(){
  // x² + bx + c = 0 with integer roots r1,r2
  const r1=ri(-4,4); let r2; do{r2=ri(-4,4);}while(r2===r1);
  const b=-(r1+r2), c=r1*r2;
  let t='x²';
  if(b!==0) t+=b>0?` + ${b}x`:` - ${Math.abs(b)}x`;
  if(c!==0) t+=c>0?` + ${c}`:` - ${Math.abs(c)}`;
  const ans=Math.min(r1,r2);
  return {text:`${t} = 0,  xmin = ?`, answer:ans};
}

function gen3(){
  // ax + b > c  or  ax + b < c
  const a=ri(1,4), x=ri(-4,7), b=ri(-4,4), c=a*x+b;
  const gt=Math.random()<0.5;
  const aS=a===1?'x':`${a}x`;
  const bS=b===0?'':(b>0?` + ${b}`:` - ${Math.abs(b)}`);
  const sym=gt?'>':'<';
  return {text:`${aS}${bS} ${sym} ${c},  x ${sym} ?`, answer:x};
}

function gen4(){
  // x+y=a, x-y=b  =>  x=(a+b)/2
  const x=ri(-3,7), y=ri(-3,7);
  const a=x+y, b=x-y;
  return {text:`x+y=${a},  x-y=${b},  x = ?`, answer:x};
}

const GENS=[gen1,gen2,gen3,gen4];

function genProblem(){
  problem = GENS[Math.min(level-1,3)]();
  assignBrickValues();
}

function assignBrickValues(){
  const active = bricks.filter(b=>b.active);
  if(!active.length) return;
  const ans = problem.answer;
  // Build a pool of wrong values around answer
  const pool=new Set();
  let tries=0;
  while(pool.size < bricks.length+10 && tries<500){
    tries++;
    const v=ans+ri(-9,9);
    if(v!==ans) pool.add(v);
  }
  // Ensure enough wrong values
  for(let i=-15;pool.size<bricks.length+5;i++) if(i!==ans) pool.add(i);
  const wrongs=[...pool];
  let wi=0;
  bricks.forEach(b=>{if(b.active){b.value=wrongs[wi++];}} );
  // Place answer on random active brick
  const pick=active[Math.floor(Math.random()*active.length)];
  pick.value=ans;
  targetIdx=bricks.indexOf(pick);
}

// ── Bricks ────────────────────────────────────────────────────────────────
function initBricks(){
  bricks=[];
  for(let r=0;r<BRICK_ROWS;r++){
    for(let c=0;c<BRICK_COLS;c++){
      bricks.push({
        x: BRICK_SX+c*(BRICK_W+BRICK_GAP),
        y: BRICK_SY+r*(BRICK_H+BRICK_GAP),
        w: BRICK_W, h: BRICK_H,
        active: true,
        color: NEON[(r*3+c*2)%NEON.length],
        value: 0
      });
    }
  }
}

// ── Ball & Paddle ─────────────────────────────────────────────────────────
function initBall(){
  const spd=SPEEDS[Math.min(level-1,3)];
  const ang=-Math.PI/2+(Math.random()-0.5)*0.8;
  ball={x:W/2, y:PADDLE_CY-35, r:BALL_R, vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd};
}

function initPaddle(){
  paddle={x:mouseX, w:PADDLE_W_BASE};
}

// ── Particles ─────────────────────────────────────────────────────────────
function spawnParticles(x,y,color,n=16){
  for(let i=0;i<n;i++){
    const ang=Math.random()*Math.PI*2, spd=1.5+Math.random()*5;
    particles.push({
      x,y,
      vx:Math.cos(ang)*spd,
      vy:Math.sin(ang)*spd,
      life:1, decay:0.018+Math.random()*0.025,
      r:2.5+Math.random()*3.5, color
    });
  }
}

function spawnRing(x,y,color){
  // Shockwave ring via many particles in a ring
  for(let i=0;i<24;i++){
    const ang=(i/24)*Math.PI*2, spd=4+Math.random()*3;
    particles.push({
      x,y,
      vx:Math.cos(ang)*spd,
      vy:Math.sin(ang)*spd,
      life:1, decay:0.05, r:3, color
    });
  }
}

// ── Collision ─────────────────────────────────────────────────────────────
function collideBrick(b){
  const cx=ball.x, cy=ball.y, r=ball.r;
  const nearX=Math.max(b.x,Math.min(cx,b.x+b.w));
  const nearY=Math.max(b.y,Math.min(cy,b.y+b.h));
  const dx=cx-nearX, dy=cy-nearY;
  if(dx*dx+dy*dy>r*r) return false;
  // Reflect
  const fromTop = cy < b.y+b.h/2;
  const fromLeft= cx < b.x+b.w/2;
  const penX = r - Math.abs(dx);
  const penY = r - Math.abs(dy);
  if(penY<=penX){
    ball.vy=-ball.vy;
    ball.y = fromTop ? b.y-r-0.1 : b.y+b.h+r+0.1;
  } else {
    ball.vx=-ball.vx;
    ball.x = fromLeft ? b.x-r-0.1 : b.x+b.w+r+0.1;
  }
  return true;
}

function checkBricks(){
  for(let i=0;i<bricks.length;i++){
    const b=bricks[i];
    if(!b.active) continue;
    if(collideBrick(b)){
      b.active=false;
      if(i===targetIdx){
        // Risposta corretta: punti bonus + effetto speciale
        score+=100*level;
        spawnParticles(b.x+b.w/2, b.y+b.h/2, b.color, 20);
        spawnRing(b.x+b.w/2, b.y+b.h/2, '#ffffff');
        screenFlash=12;
        sfx.correct();
        const remaining=bricks.filter(x=>x.active).length;
        if(remaining===0){
          setTimeout(()=>{gs= level>=4?'victory':'levelwin'; sfx.levelup();},600);
        } else {
          genProblem();
        }
      } else {
        // Risposta sbagliata: sparisce senza punti
        spawnParticles(b.x+b.w/2, b.y+b.h/2, b.color, 8);
        sfx.wrong();
        const remaining=bricks.filter(x=>x.active).length;
        if(remaining===0){
          // Tutti i mattoncini distrutti senza trovare la risposta: rigenera i mattoncini
          initBricks();
          assignBrickValues();
        }
      }
      break;
    }
  }
}

function checkPaddle(){
  const px=paddle.x-paddle.w/2, py=PADDLE_CY-PADDLE_H/2;
  if(ball.vy>0 &&
     ball.y+ball.r>=py && ball.y-ball.r<=py+PADDLE_H &&
     ball.x>=px && ball.x<=px+paddle.w){
    const hit=(ball.x-paddle.x)/(paddle.w/2); // -1..1
    const ang=hit*(Math.PI/3);
    const spd=Math.hypot(ball.vx,ball.vy);
    ball.vx=Math.sin(ang)*spd;
    ball.vy=-Math.cos(ang)*spd;
    ball.y=py-ball.r-0.5;
    sfx.bounce();
  }
}

// ── Update ────────────────────────────────────────────────────────────────
function update(){
  if(gs!=='playing') return;
  pulse+=0.055;
  if(screenFlash>0) screenFlash--;

  // Paddle via mouse + keyboard
  paddle.x=mouseX;
  if(keys['ArrowLeft']||keys['a'])  { paddle.x-=8; mouseX-=8; }
  if(keys['ArrowRight']||keys['d']) { paddle.x+=8; mouseX+=8; }
  paddle.x=Math.max(paddle.w/2, Math.min(W-paddle.w/2, paddle.x));
  mouseX=paddle.x;

  // Ball
  ball.x+=ball.vx; ball.y+=ball.vy;

  // Walls
  if(ball.x-ball.r<=0)     { ball.x=ball.r+0.1;    ball.vx=Math.abs(ball.vx); sfx.bounce(); }
  if(ball.x+ball.r>=W)     { ball.x=W-ball.r-0.1;  ball.vx=-Math.abs(ball.vx); sfx.bounce(); }
  if(ball.y-ball.r<=GAME_TOP){ ball.y=GAME_TOP+ball.r+0.1; ball.vy=Math.abs(ball.vy); sfx.bounce(); }

  // Lost ball
  if(ball.y-ball.r>GAME_BOTTOM+20){
    lives--;
    screenFlash=25;
    sfx.death();
    if(lives<=0){ gs='gameover'; sfx.gameover(); }
    else initBall();
  }

  checkBricks();
  checkPaddle();

  // Particles
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.08;
    p.life-=p.decay; p.r*=0.97;
  });

  // Flash timers
  for(const k in flashBricks){
    flashBricks[k].timer--;
    if(flashBricks[k].timer<=0) delete flashBricks[k];
  }
}

// ── Draw helpers ──────────────────────────────────────────────────────────
function glow(color,blur=10){ ctx.shadowColor=color; ctx.shadowBlur=blur; }
function noGlow(){ ctx.shadowBlur=0; }

function drawGrid(){
  ctx.strokeStyle='rgba(0,255,255,0.025)';
  ctx.lineWidth=1;
  for(let x=0;x<W;x+=30){ ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke(); }
  for(let y=0;y<H;y+=30){ ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke(); }
}

function drawHUD(){
  // Background bar
  ctx.fillStyle='rgba(0,0,20,0.9)';
  ctx.fillRect(0,0,W,HUD_H);
  ctx.strokeStyle='rgba(0,255,255,0.3)';
  ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,HUD_H); ctx.lineTo(W,HUD_H); ctx.stroke();

  ctx.font='bold 15px "Courier New"';
  ctx.textBaseline='middle';

  // Score
  ctx.textAlign='left';
  glow('#0ff',8);
  ctx.fillStyle='#0ff';
  ctx.fillText(`PUNTI: ${score}`,10,HUD_H/2);

  // Level
  const lc=LEVEL_CLR[level-1];
  ctx.textAlign='center';
  glow(lc,8);
  ctx.fillStyle=lc;
  ctx.fillText(`LIVELLO ${level}`,W/2,HUD_H/2);

  // Lives
  ctx.textAlign='right';
  glow('#ff4455',8);
  ctx.fillStyle='#ff4455';
  ctx.font='bold 14px "Courier New"';
  ctx.fillText('♥'.repeat(lives)+'♡'.repeat(Math.max(0,3-lives)),W-10,HUD_H/2);

  noGlow();
  ctx.textBaseline='alphabetic';
}

function drawBricks(){
  const lc=LEVEL_CLR[level-1];
  for(let i=0;i<bricks.length;i++){
    const b=bricks[i]; if(!b.active) continue;
    const isTarget=i===targetIdx;
    const isFlash=!!flashBricks[i];
    const ft=isFlash?flashBricks[i].timer:0;

    let fillColor, strokeColor;
    if(isFlash){
      const t=ft/18;
      fillColor=`rgba(255,${Math.floor(60*t)},${Math.floor(60*t)},${0.3+0.4*t})`;
      strokeColor=`rgba(255,${Math.floor(100*t)},${Math.floor(100*t)},${0.5+0.5*t})`;
    } else if(isTarget){
      const p=(Math.sin(pulse*3)+1)/2;
      fillColor=`rgba(255,${Math.floor(180+p*75)},0,0.25)`;
      strokeColor=`rgba(255,${Math.floor(200+p*55)},0,${0.8+p*0.2})`;
    } else {
      fillColor=b.color+'2a';
      strokeColor=b.color;
    }

    ctx.fillStyle=fillColor;
    ctx.fillRect(b.x,b.y,b.w,b.h);

    if(isTarget){
      const p=(Math.sin(pulse*3)+1)/2;
      ctx.shadowColor='#ffcc00';
      ctx.shadowBlur=8+p*12;
      ctx.strokeStyle=strokeColor;
      ctx.lineWidth=2+p*2;
    } else {
      ctx.shadowColor=isFlash?'#ff2222':b.color;
      ctx.shadowBlur=isFlash?12:4;
      ctx.strokeStyle=strokeColor;
      ctx.lineWidth=1.5;
    }
    ctx.strokeRect(b.x+1,b.y+1,b.w-2,b.h-2);
    noGlow(); ctx.lineWidth=1;

    // Number
    const val=String(b.value);
    const fontSize= val.length>3 ? 9 : 11;
    ctx.font=`bold ${isTarget?fontSize+2:fontSize}px "Courier New"`;
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillStyle=isTarget?'#ffee00':isFlash?'#ff9999':'#ffffff';
    glow(isTarget?'#ffaa00':b.color, isTarget?10:3);
    ctx.fillText(val, b.x+b.w/2, b.y+b.h/2);
    noGlow();
    ctx.textBaseline='alphabetic';
  }
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function drawPaddle(){
  const lc=LEVEL_CLR[level-1];
  const px=paddle.x-paddle.w/2, py=PADDLE_CY-PADDLE_H/2;
  glow(lc,18);
  ctx.fillStyle=lc;
  roundRect(px,py,paddle.w,PADDLE_H,6);
  ctx.fill();
  // Highlight
  ctx.fillStyle='rgba(255,255,255,0.3)';
  roundRect(px+4,py+2,paddle.w-8,4,3);
  ctx.fill();
  noGlow();
}

function drawBall(){
  const lc=LEVEL_CLR[level-1];
  glow(lc,18);
  ctx.fillStyle=lc;
  ctx.beginPath(); ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2); ctx.fill();
  noGlow();
  ctx.fillStyle='rgba(255,255,255,0.9)';
  ctx.beginPath(); ctx.arc(ball.x-ball.r*0.3,ball.y-ball.r*0.3,ball.r*0.3,0,Math.PI*2); ctx.fill();
}

function drawParticles(){
  particles.forEach(p=>{
    ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,Math.max(0.1,p.r),0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;
}

function drawProblem(){
  ctx.fillStyle='rgba(0,0,30,0.92)';
  ctx.fillRect(0,H-62,W,62);
  const lc=LEVEL_CLR[level-1];
  ctx.strokeStyle=lc;
  ctx.lineWidth=1;
  glow(lc,5);
  ctx.beginPath(); ctx.moveTo(0,H-62); ctx.lineTo(W,H-62); ctx.stroke();
  noGlow();

  // Problem text — auto font size
  const txt=problem.text;
  let fsize=17;
  if(txt.length>38) fsize=14;
  if(txt.length>50) fsize=12;
  ctx.font=`bold ${fsize}px "Courier New"`;
  ctx.textAlign='center';
  ctx.fillStyle='#ffffff';
  glow('#ffffff',5);
  ctx.fillText(txt,W/2,H-38);
  noGlow();

  ctx.font='11px "Courier New"';
  ctx.fillStyle='#556677';
  ctx.fillText('Colpisci il mattoncino con la risposta giusta!',W/2,H-16);
}

function drawScreenFlash(){
  if(screenFlash>0){
    ctx.fillStyle=`rgba(255,255,255,${screenFlash/35})`;
    ctx.fillRect(0,0,W,H);
  }
}

// ── Overlay screens ───────────────────────────────────────────────────────
function blink(){ return Math.floor(Date.now()/520)%2===0; }

function drawMenu(){
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
  drawGrid();

  ctx.textAlign='center';
  ctx.font='bold 52px "Courier New"';
  glow('#00ffff',30); ctx.fillStyle='#00ffff';
  ctx.fillText('MATH',W/2,155);
  glow('#ff00ff',30); ctx.fillStyle='#ff00ff';
  ctx.fillText('ARKANOID',W/2,220);
  noGlow();

  const lines=[
    {t:'Distruggi il mattoncino con la risposta!', c:'#aaaaaa', f:'14px'},
    {t:'', c:'', f:'14px'},
    {t:'LIVELLO 1 ─ Equazioni lineari        🟦', c:'#00ffff', f:'13px'},
    {t:'LIVELLO 2 ─ Equazioni quadratiche    🟣', c:'#ff00ff', f:'13px'},
    {t:'LIVELLO 3 ─ Disequazioni             🟡', c:'#ffff00', f:'13px'},
    {t:'LIVELLO 4 ─ Sistemi lineari          🟠', c:'#ff8800', f:'13px'},
    {t:'', c:'', f:'14px'},
    {t:'← → o mouse per muovere la racchetta', c:'#778899', f:'13px'},
    {t:'Il mattoncino bersaglio ha il bordo dorato', c:'#ffcc44', f:'13px'},
  ];
  let y=275;
  lines.forEach(l=>{
    ctx.font=`${l.f} "Courier New"`;
    ctx.fillStyle=l.c||'#888';
    if(l.t) ctx.fillText(l.t,W/2,y);
    y+=22;
  });

  if(blink()){
    ctx.font='bold 20px "Courier New"';
    glow('#00ffff',12); ctx.fillStyle='#00ffff';
    ctx.fillText('[ PREMI SPAZIO o CLICK per iniziare ]',W/2,588);
    noGlow();
  }
}

function drawOverlay(title,titleColor,lines,actionText){
  ctx.fillStyle='rgba(0,0,0,0.88)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.font='bold 42px "Courier New"';
  glow(titleColor,25); ctx.fillStyle=titleColor;
  ctx.fillText(title,W/2,H/2-90);
  noGlow();

  ctx.font='20px "Courier New"';
  ctx.fillStyle='#cccccc';
  lines.forEach((l,i)=>ctx.fillText(l,W/2,H/2-20+i*32));

  if(blink()){
    ctx.font='bold 17px "Courier New"';
    glow('#00ffff',10); ctx.fillStyle='#00ffff';
    ctx.fillText(actionText,W/2,H/2+110);
    noGlow();
  }
}

function drawLevelWin(){
  drawOverlay(
    '★ LIVELLO COMPLETATO! ★','#ffff00',
    [`Punteggio: ${score}`,`Livello ${level} superato!`],
    '[ SPAZIO ] ─ Prossimo livello'
  );
}

function drawVictory(){
  ctx.fillStyle='rgba(0,0,0,0.9)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.font='bold 44px "Courier New"';
  glow('#ffff00',30); ctx.fillStyle='#ffff00';
  ctx.fillText('HAI VINTO!!!',W/2,H/2-100);
  noGlow();
  ctx.font='bold 26px "Courier New"';
  ['Complimenti, matematico!',`Punteggio finale: ${score}`,'Tutti i 4 livelli completati!'].forEach((l,i)=>{
    const c=LEVEL_CLR[i%4]; glow(c,8); ctx.fillStyle=c;
    ctx.fillText(l,W/2,H/2-30+i*38);
  });
  noGlow();
  if(blink()){
    ctx.font='bold 16px "Courier New"';
    glow('#fff',5); ctx.fillStyle='#fff';
    ctx.fillText('[ SPAZIO ] ─ Ricomincia da capo',W/2,H/2+120);
    noGlow();
  }
}

function drawGameOver(){
  drawOverlay(
    'GAME OVER','#ff2222',
    [`Punteggio: ${score}`,`Livello: ${level}`,`Vite rimaste: ${'♥'.repeat(lives)}`],
    '[ SPAZIO ] ─ Riprova'
  );
}

// ── Main draw ─────────────────────────────────────────────────────────────
function draw(){
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);

  if(gs==='menu')    { drawMenu(); return; }
  if(gs==='gameover'){ drawGameOver(); return; }
  if(gs==='victory') { drawVictory(); return; }

  drawGrid();
  drawHUD();
  drawBricks();
  drawBall();
  drawPaddle();
  drawParticles();
  drawProblem();
  drawScreenFlash();

  if(gs==='levelwin') drawLevelWin();
}

// ── Game management ───────────────────────────────────────────────────────
function startGame(){
  score=0; lives=3; level=1; startLevel();
}

function startLevel(){
  flashBricks={}; particles=[];
  initBricks(); initBall(); initPaddle();
  genProblem();
  gs='playing';
}

function nextLevel(){
  if(level>=4){ gs='victory'; sfx.levelup(); }
  else { level++; startLevel(); }
}

// ── Input ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(e.key===' '){
    if(gs==='menu'||gs==='gameover') startGame();
    else if(gs==='levelwin')         nextLevel();
    else if(gs==='victory')          startGame();
    e.preventDefault();
  }
  if(['ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup',e=>{ keys[e.key]=false; });

canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  mouseX=(e.clientX-r.left)*(W/r.width);
});

canvas.addEventListener('click',()=>{
  if(gs==='menu'||gs==='gameover') startGame();
  else if(gs==='levelwin')         nextLevel();
  else if(gs==='victory')          startGame();
});

// ── Touch controls ────────────────────────────────────────────────────────
function touchX(e){
  const r=canvas.getBoundingClientRect();
  return (e.touches[0].clientX-r.left)*(W/r.width);
}

canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  mouseX=touchX(e);
  if(gs==='menu'||gs==='gameover') startGame();
  else if(gs==='levelwin')         nextLevel();
  else if(gs==='victory')          startGame();
},{passive:false});

canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  mouseX=touchX(e);
},{passive:false});

// ── Loop ──────────────────────────────────────────────────────────────────
let last=0;
function loop(ts){
  update();
  draw();
  last=ts;
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
