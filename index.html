<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Math Arkanoid</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;touch-action:none;user-select:none}
canvas{display:block;cursor:none;width:100%;max-width:600px;height:auto;touch-action:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = 600;
canvas.height = 710;
const W = canvas.width, H = canvas.height;

// ── Layout ────────────────────────────────────────────────────────────────
const HUD_H = 56;
const GAME_TOP = HUD_H;
const GAME_BOTTOM = 648;
const PADDLE_CY = 630;
const PADDLE_H = 14;
const PADDLE_W_BASE = 90;
const BALL_R = 8;
const BRICK_COLS = 10;
const BRICK_W = 54;
const BRICK_H = 22;
const BRICK_GAP = 4;
const BRICK_SX = (W - (BRICK_COLS * BRICK_W + (BRICK_COLS - 1) * BRICK_GAP)) / 2;
const BRICK_SY = 64;

// ── Neon palette ──────────────────────────────────────────────────────────
const NEON = ['#ff0080','#00ff80','#0080ff','#ffff00','#ff8000','#ff00ff','#00ffff','#80ff00'];
const LEVEL_CLR = ['#00ffff','#ff00ff','#ffff00','#ff8800'];

// ── Audio ─────────────────────────────────────────────────────────────────
let AC;
function ac(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC;}
function tone(freq,type,dur,vol=0.25,delay=0){
  try{
    const a=ac(),o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(a.destination);
    o.type=type;o.frequency.value=freq;
    const t=a.currentTime+delay;
    g.gain.setValueAtTime(vol,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.start(t);o.stop(t+dur);
  }catch(e){}
}
const sfx={
  bounce:  ()=>tone(220,'square',0.05,0.18),
  wrong:   ()=>tone(140,'sawtooth',0.12,0.2),
  correct: ()=>{tone(440,'square',0.1,0.3);tone(660,'square',0.1,0.3,0.1);tone(880,'square',0.15,0.3,0.22);},
  death:   ()=>{tone(300,'sawtooth',0.1,0.35);tone(180,'sawtooth',0.12,0.35,0.12);tone(90,'sawtooth',0.2,0.4,0.26);},
  levelup: ()=>[523,659,784,1047].forEach((f,i)=>tone(f,'square',0.2,0.3,i*0.13)),
  gameover:()=>{tone(200,'sawtooth',0.18,0.4);tone(150,'sawtooth',0.18,0.5,0.2);tone(100,'sawtooth',0.3,0.7,0.45);},
  powerup: ()=>{tone(523,'square',0.08,0.3);tone(784,'square',0.08,0.3,0.1);tone(1047,'square',0.1,0.3,0.2);},
  timerlow:()=>tone(880,'square',0.05,0.15),
};

// ── Difficulty ────────────────────────────────────────────────────────────
const DIFF={
  facile:   {speedMult:0.72, timerSec:300, rows:4, label:'FACILE',    color:'#00ff80'},
  medio:    {speedMult:1.0,  timerSec:300, rows:5, label:'MEDIO',     color:'#ffff00'},
  difficile:{speedMult:1.38, timerSec:300, rows:6, label:'DIFFICILE', color:'#ff4444'},
};
const BASE_SPEEDS=[3.5,4.5,5.5,7.0];

// ── High scores ───────────────────────────────────────────────────────────
function loadScores(){try{return JSON.parse(localStorage.getItem('mathArk_scores')||'[]');}catch(e){return[];}}
function saveScores(arr){try{localStorage.setItem('mathArk_scores',JSON.stringify(arr));}catch(e){}}
function addScore(name,sc){
  const arr=loadScores();
  arr.push({name:(name||'PLAYER').trim().slice(0,12),score:sc});
  arr.sort((a,b)=>b.score-a.score);
  arr.splice(5);
  saveScores(arr);
}
function qualifiesTop5(sc){
  if(sc<=0)return false;
  const arr=loadScores();
  return arr.length<5||sc>arr[arr.length-1].score;
}

// ── State ─────────────────────────────────────────────────────────────────
// gs: menu | playing | paused | levelwin | gameover | victory | nameentry
let gs='menu', prevGS='gameover';
let score=0, lives=3, level=1;
let balls=[], paddle={}, bricks=[], particles=[];
let powerups=[];
let fx={widePaddle:0, slowBall:0, fireball:0}; // active effect frames
let flashBricks={}, targetIdx=-1, problem={text:'',answer:0};
let pulse=0, screenFlash=0;
let keys={}, mouseX=W/2;
let difficulty='medio';
let probTimer=0, probTimerMax=0;
let nameInput='';

// ── Math generators ───────────────────────────────────────────────────────
function ri(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function gen1(){
  const a=ri(1,4),x=ri(-5,8),b=ri(-5,5),c=a*x+b;
  const aS=a===1?'x':`${a}x`;
  let t;
  if(b===0)t=`${aS} = ${c}`;
  else if(b>0)t=`${aS} + ${b} = ${c}`;
  else t=`${aS} - ${Math.abs(b)} = ${c}`;
  return{text:`${t},  x = ?`,answer:x};
}
function gen2(){
  const r1=ri(-4,4);let r2;do{r2=ri(-4,4);}while(r2===r1);
  const b=-(r1+r2),c=r1*r2;
  let t='x²';
  if(b!==0)t+=b>0?` + ${b}x`:` - ${Math.abs(b)}x`;
  if(c!==0)t+=c>0?` + ${c}`:` - ${Math.abs(c)}`;
  return{text:`${t} = 0,  xmin = ?`,answer:Math.min(r1,r2)};
}
function gen3(){
  const a=ri(1,4),x=ri(-4,7),b=ri(-4,4),c=a*x+b;
  const gt=Math.random()<0.5;
  const aS=a===1?'x':`${a}x`;
  const bS=b===0?'':(b>0?` + ${b}`:` - ${Math.abs(b)}`);
  const sym=gt?'>':'<';
  return{text:`${aS}${bS} ${sym} ${c},  x ${sym} ?`,answer:x};
}
function gen4(){
  const x=ri(-3,7),y=ri(-3,7);
  return{text:`x+y=${x+y},  x-y=${x-y},  x = ?`,answer:x};
}
const GENS=[gen1,gen2,gen3,gen4];

function genProblem(){
  problem=GENS[Math.min(level-1,3)]();
  assignBrickValues();
  probTimerMax=DIFF[difficulty].timerSec*60;
  probTimer=probTimerMax;
}

function assignBrickValues(){
  const active=bricks.filter(b=>b.active);
  if(!active.length)return;
  const ans=problem.answer;
  const pool=new Set();
  let tries=0;
  while(pool.size<bricks.length+10&&tries<500){tries++;const v=ans+ri(-9,9);if(v!==ans)pool.add(v);}
  for(let i=-15;pool.size<bricks.length+5;i++)if(i!==ans)pool.add(i);
  const wrongs=[...pool];let wi=0;
  bricks.forEach(b=>{if(b.active)b.value=wrongs[wi++];});
  const pick=active[Math.floor(Math.random()*active.length)];
  pick.value=ans;
  targetIdx=bricks.indexOf(pick);
}

// ── Bricks ────────────────────────────────────────────────────────────────
function initBricks(){
  bricks=[];
  const rows=DIFF[difficulty].rows;
  for(let r=0;r<rows;r++){
    for(let c=0;c<BRICK_COLS;c++){
      const rnd=Math.random();
      const tough=rnd<0.15;
      const bonus=!tough&&rnd<0.28;
      bricks.push({
        x:BRICK_SX+c*(BRICK_W+BRICK_GAP),
        y:BRICK_SY+r*(BRICK_H+BRICK_GAP),
        w:BRICK_W,h:BRICK_H,
        active:true,
        color:NEON[(r*3+c*2)%NEON.length],
        value:0,
        hits:tough?2:1,
        maxHits:tough?2:1,
        bonus:bonus,
      });
    }
  }
}

// ── Ball ─────────────────────────────────────────────────────────────────
function makeBall(x,y,spd,ang){
  ang=ang!==undefined?ang:(-Math.PI/2+(Math.random()-0.5)*0.8);
  return{x,y,r:BALL_R,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,fire:false};
}
function initBall(){
  const spd=BASE_SPEEDS[Math.min(level-1,3)]*DIFF[difficulty].speedMult;
  balls=[makeBall(W/2,PADDLE_CY-35,spd)];
}
function initPaddle(){paddle={x:mouseX,w:PADDLE_W_BASE};}

// ── Particles ─────────────────────────────────────────────────────────────
function spawnParticles(x,y,color,n=16){
  for(let i=0;i<n;i++){
    const ang=Math.random()*Math.PI*2,spd=1.5+Math.random()*5;
    particles.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,life:1,decay:0.018+Math.random()*0.025,r:2.5+Math.random()*3.5,color});
  }
}
function spawnRing(x,y,color){
  for(let i=0;i<24;i++){
    const ang=(i/24)*Math.PI*2,spd=4+Math.random()*3;
    particles.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,life:1,decay:0.05,r:3,color});
  }
}

// ── Power-ups ─────────────────────────────────────────────────────────────
const PU_TYPES=['widePaddle','slowBall','fireball','multiBall'];
const PU_CLR={widePaddle:'#00ffcc',slowBall:'#8888ff',fireball:'#ff6600',multiBall:'#ff00ff'};
const PU_LBL={widePaddle:'WIDE',slowBall:'SLOW',fireball:'FIRE',multiBall:'+BALL'};

function spawnPowerup(x,y){
  const type=PU_TYPES[Math.floor(Math.random()*PU_TYPES.length)];
  powerups.push({x,y,vy:2.0,type,alive:true});
}
function collectPowerup(pu){
  sfx.powerup();
  spawnParticles(pu.x,pu.y,PU_CLR[pu.type],10);
  pu.alive=false;
  if(pu.type==='widePaddle'){fx.widePaddle=10*60;}
  else if(pu.type==='slowBall'){fx.slowBall=10*60;}
  else if(pu.type==='fireball'){fx.fireball=5*60;balls.forEach(b=>b.fire=true);}
  else if(pu.type==='multiBall'){
    if(balls.length<5){
      const ref=balls[0]||{x:W/2,y:PADDLE_CY-35};
      const spd=BASE_SPEEDS[Math.min(level-1,3)]*DIFF[difficulty].speedMult*(fx.slowBall>0?0.5:1);
      const nb=makeBall(ref.x,ref.y,spd);
      nb.fire=fx.fireball>0;
      balls.push(nb);
    }
  }
}

// ── Collision ─────────────────────────────────────────────────────────────
function collideBrick(ball,b){
  const nearX=Math.max(b.x,Math.min(ball.x,b.x+b.w));
  const nearY=Math.max(b.y,Math.min(ball.y,b.y+b.h));
  const dx=ball.x-nearX,dy=ball.y-nearY;
  if(dx*dx+dy*dy>ball.r*ball.r)return false;
  const penX=ball.r-Math.abs(dx),penY=ball.r-Math.abs(dy);
  if(penY<=penX){ball.vy=-ball.vy;ball.y=(ball.y<b.y+b.h/2)?b.y-ball.r-0.1:b.y+b.h+ball.r+0.1;}
  else{ball.vx=-ball.vx;ball.x=(ball.x<b.x+b.w/2)?b.x-ball.r-0.1:b.x+b.w+ball.r+0.1;}
  return true;
}

function checkBricksForBall(ball){
  for(let i=0;i<bricks.length;i++){
    const b=bricks[i];
    if(!b.active)continue;
    if(!collideBrick(ball,b))continue;
    const isTarget=i===targetIdx;
    let destroyed=false;
    if(ball.fire){
      b.active=false;destroyed=true;
      spawnParticles(b.x+b.w/2,b.y+b.h/2,'#ff6600',10);
      if(isTarget){score+=100*level;spawnRing(b.x+b.w/2,b.y+b.h/2,'#ffffff');screenFlash=12;sfx.correct();if(Math.random()<0.4)spawnPowerup(b.x+b.w/2,b.y+b.h/2);}
      else{score+=b.bonus?150:10;sfx.wrong();}
    }else if(isTarget){
      b.active=false;destroyed=true;
      score+=100*level;
      spawnParticles(b.x+b.w/2,b.y+b.h/2,b.color,20);
      spawnRing(b.x+b.w/2,b.y+b.h/2,'#ffffff');
      screenFlash=12;sfx.correct();
      if(Math.random()<0.4)spawnPowerup(b.x+b.w/2,b.y+b.h/2);
    }else{
      b.hits--;
      if(b.hits<=0){
        b.active=false;destroyed=true;
        spawnParticles(b.x+b.w/2,b.y+b.h/2,b.color,8);
        if(b.bonus){score+=150;spawnRing(b.x+b.w/2,b.y+b.h/2,'#ffdd00');}
        sfx.wrong();
      }else{
        flashBricks[i]={timer:18};
        sfx.bounce();
      }
    }
    if(destroyed){
      const rem=bricks.filter(x=>x.active).length;
      if(rem===0){
        setTimeout(()=>{if(level>=4)triggerEnd('victory');else{gs='levelwin';sfx.levelup();}},600);
      }else if(isTarget){
        genProblem();
      }
    }
    break;
  }
}

function checkPaddle(ball){
  const px=paddle.x-paddle.w/2,py=PADDLE_CY-PADDLE_H/2;
  if(ball.vy>0&&ball.y+ball.r>=py&&ball.y-ball.r<=py+PADDLE_H&&ball.x>=px&&ball.x<=px+paddle.w){
    const hit=(ball.x-paddle.x)/(paddle.w/2);
    const ang=hit*(Math.PI/3);
    const spd=Math.hypot(ball.vx,ball.vy);
    ball.vx=Math.sin(ang)*spd;
    ball.vy=-Math.cos(ang)*spd;
    ball.y=py-ball.r-0.5;
    sfx.bounce();
  }
}

// ── End state ─────────────────────────────────────────────────────────────
function triggerEnd(state){
  if(state==='victory')sfx.levelup();else sfx.gameover();
  prevGS=state;
  if(qualifiesTop5(score)){gs='nameentry';nameInput='';}
  else gs=state;
}

// ── Update ────────────────────────────────────────────────────────────────
function update(){
  if(gs!=='playing')return;
  pulse+=0.055;
  if(screenFlash>0)screenFlash--;

  // Decay active effects
  for(const k in fx)if(fx[k]>0)fx[k]--;
  if(fx.fireball<=0)balls.forEach(b=>b.fire=false);
  paddle.w=fx.widePaddle>0?PADDLE_W_BASE*1.75:PADDLE_W_BASE;

  // Paddle
  paddle.x=mouseX;
  if(keys['ArrowLeft']||keys['a']){paddle.x-=8;mouseX-=8;}
  if(keys['ArrowRight']||keys['d']){paddle.x+=8;mouseX+=8;}
  paddle.x=Math.max(paddle.w/2,Math.min(W-paddle.w/2,paddle.x));
  mouseX=paddle.x;

  // Problem timer
  probTimer--;
  if(probTimer<=0){
    lives--;screenFlash=25;sfx.death();
    if(lives<=0){triggerEnd('gameover');return;}
    genProblem();
  }
  if(probTimer>0&&probTimer%60===0&&probTimer<=30*60)sfx.timerlow();

  // Ball movement
  const sf=fx.slowBall>0?0.5:1.0;
  balls.forEach(ball=>{
    ball.x+=ball.vx*sf;ball.y+=ball.vy*sf;
    if(ball.x-ball.r<=0){ball.x=ball.r+0.1;ball.vx=Math.abs(ball.vx);sfx.bounce();}
    if(ball.x+ball.r>=W){ball.x=W-ball.r-0.1;ball.vx=-Math.abs(ball.vx);sfx.bounce();}
    if(ball.y-ball.r<=GAME_TOP){ball.y=GAME_TOP+ball.r+0.1;ball.vy=Math.abs(ball.vy);sfx.bounce();}
  });

  const before=balls.length;
  balls=balls.filter(ball=>!(ball.y-ball.r>GAME_BOTTOM+20));
  if(balls.length<before&&balls.length===0){
    lives--;screenFlash=25;sfx.death();
    if(lives<=0){triggerEnd('gameover');return;}
    initBall();
  }
  if(gs!=='playing')return;

  balls.forEach(ball=>{checkBricksForBall(ball);checkPaddle(ball);});

  // Power-ups
  powerups.forEach(pu=>{
    if(!pu.alive)return;
    pu.y+=pu.vy;
    const px=paddle.x-paddle.w/2,py=PADDLE_CY-PADDLE_H/2;
    if(pu.y>=py-8&&pu.y<=py+PADDLE_H&&pu.x>=px&&pu.x<=px+paddle.w)collectPowerup(pu);
    else if(pu.y>H+20)pu.alive=false;
  });
  powerups=powerups.filter(pu=>pu.alive);

  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.08;p.life-=p.decay;p.r*=0.97;});

  for(const k in flashBricks){flashBricks[k].timer--;if(flashBricks[k].timer<=0)delete flashBricks[k];}
}

// ── Draw helpers ──────────────────────────────────────────────────────────
function glow(color,blur=10){ctx.shadowColor=color;ctx.shadowBlur=blur;}
function noGlow(){ctx.shadowBlur=0;}
function roundRect(x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}
function drawGrid(){
  ctx.strokeStyle='rgba(0,255,255,0.025)';ctx.lineWidth=1;
  for(let x=0;x<W;x+=30){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=30){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
}

// ── HUD ───────────────────────────────────────────────────────────────────
function drawHUD(){
  ctx.fillStyle='rgba(0,0,20,0.92)';ctx.fillRect(0,0,W,HUD_H);
  ctx.strokeStyle='rgba(0,255,255,0.25)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,HUD_H);ctx.lineTo(W,HUD_H);ctx.stroke();

  // Row 1: score | level | lives
  ctx.font='bold 14px "Courier New"';ctx.textBaseline='middle';
  ctx.textAlign='left';glow('#0ff',8);ctx.fillStyle='#0ff';
  ctx.fillText(`PUNTI: ${score}`,10,17);

  const lc=LEVEL_CLR[level-1];
  ctx.textAlign='center';glow(lc,8);ctx.fillStyle=lc;
  ctx.fillText(`LIVELLO ${level}`,W/2,17);

  ctx.textAlign='right';glow('#ff4455',8);ctx.fillStyle='#ff4455';
  ctx.font='bold 13px "Courier New"';
  ctx.fillText('♥'.repeat(lives)+'♡'.repeat(Math.max(0,3-lives)),W-10,17);
  noGlow();

  // Row 2: timer bar + effects
  const frac=Math.max(0,probTimer/probTimerMax);
  const barX=10,barY=32,barW=W-20,barH=5;
  ctx.fillStyle='rgba(255,255,255,0.08)';ctx.fillRect(barX,barY,barW,barH);
  const tColor=frac>0.5?'#00ff80':frac>0.25?'#ffff00':'#ff3333';
  glow(tColor,6);ctx.fillStyle=tColor;
  ctx.fillRect(barX,barY,barW*frac,barH);
  noGlow();

  // Timer seconds
  const secsLeft=Math.ceil(probTimer/60);
  const mm=String(Math.floor(secsLeft/60)).padStart(2,'0');
  const ss=String(secsLeft%60).padStart(2,'0');
  ctx.font='10px "Courier New"';ctx.textAlign='right';ctx.textBaseline='top';
  ctx.fillStyle=tColor;ctx.fillText(`${mm}:${ss}`,W-6,39);

  // Effect badges
  const effs=[];
  if(fx.widePaddle>0)effs.push({k:'widePaddle',s:Math.ceil(fx.widePaddle/60)});
  if(fx.slowBall>0)effs.push({k:'slowBall',s:Math.ceil(fx.slowBall/60)});
  if(fx.fireball>0)effs.push({k:'fireball',s:Math.ceil(fx.fireball/60)});
  effs.forEach((e,i)=>{
    const ex=10+i*55,ey=39;
    ctx.font='bold 9px "Courier New"';ctx.textAlign='left';ctx.textBaseline='top';
    glow(PU_CLR[e.k],5);ctx.fillStyle=PU_CLR[e.k];
    ctx.fillText(`${PU_LBL[e.k]} ${e.s}s`,ex,ey);
    noGlow();
  });

  // Pause hint
  ctx.font='9px "Courier New"';ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillStyle='#334455';ctx.fillText('[P] pausa',10,39);

  ctx.textBaseline='alphabetic';
}

// ── Bricks ────────────────────────────────────────────────────────────────
function drawBricks(){
  for(let i=0;i<bricks.length;i++){
    const b=bricks[i];if(!b.active)continue;
    const isTarget=i===targetIdx;
    const isFlash=!!flashBricks[i];
    const ft=isFlash?flashBricks[i].timer:0;

    let fillColor,strokeColor;
    if(isFlash){
      const t=ft/18;
      fillColor=`rgba(255,${Math.floor(60*t)},${Math.floor(60*t)},${0.3+0.4*t})`;
      strokeColor=`rgba(255,${Math.floor(100*t)},${Math.floor(100*t)},${0.5+0.5*t})`;
    }else if(isTarget){
      const p=(Math.sin(pulse*3)+1)/2;
      fillColor=`rgba(255,${Math.floor(180+p*75)},0,0.25)`;
      strokeColor=`rgba(255,${Math.floor(200+p*55)},0,${0.8+p*0.2})`;
    }else if(b.bonus){
      const p=(Math.sin(pulse*2.5)+1)/2;
      fillColor=`rgba(255,220,0,${0.15+0.12*p})`;
      strokeColor=`rgba(255,220,0,${0.7+0.3*p})`;
    }else{
      fillColor=b.color+'2a';strokeColor=b.color;
    }

    ctx.fillStyle=fillColor;ctx.fillRect(b.x,b.y,b.w,b.h);

    if(isTarget){
      const p=(Math.sin(pulse*3)+1)/2;
      ctx.shadowColor='#ffcc00';ctx.shadowBlur=8+p*12;
      ctx.strokeStyle=strokeColor;ctx.lineWidth=2+p*2;
    }else if(b.bonus&&!isFlash){
      const p=(Math.sin(pulse*2.5)+1)/2;
      ctx.shadowColor='#ffdd00';ctx.shadowBlur=5+p*7;
      ctx.strokeStyle=strokeColor;ctx.lineWidth=1.5;
    }else{
      ctx.shadowColor=isFlash?'#ff2222':b.color;
      ctx.shadowBlur=isFlash?12:4;
      ctx.strokeStyle=strokeColor;
      ctx.lineWidth=b.maxHits===2?2.5:1.5;
    }
    ctx.strokeRect(b.x+1,b.y+1,b.w-2,b.h-2);
    noGlow();ctx.lineWidth=1;

    // Value
    const val=String(b.value);
    const fs=val.length>3?9:11;
    ctx.font=`bold ${isTarget?fs+2:fs}px "Courier New"`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle=isTarget?'#ffee00':b.bonus?'#ffe033':isFlash?'#ff9999':'#ffffff';
    glow(isTarget?'#ffaa00':b.bonus?'#ffdd00':b.color,isTarget?10:3);
    ctx.fillText(val,b.x+b.w/2,b.y+b.h/2);
    noGlow();

    // Hits indicator for tough bricks
    if(b.maxHits>1){
      ctx.font='bold 8px "Courier New"';ctx.textAlign='right';ctx.textBaseline='top';
      ctx.fillStyle='rgba(255,255,255,0.7)';
      ctx.fillText(b.hits,b.x+b.w-2,b.y+2);
    }
    // Bonus star
    if(b.bonus&&!isTarget){
      ctx.font='7px "Courier New"';ctx.textAlign='left';ctx.textBaseline='top';
      ctx.fillStyle='#ffe033';ctx.fillText('★',b.x+2,b.y+2);
    }
    ctx.textBaseline='alphabetic';
  }
}

// ── Paddle & Ball ─────────────────────────────────────────────────────────
function drawPaddle(){
  const lc=LEVEL_CLR[level-1];
  const color=fx.widePaddle>0?'#00ffcc':lc;
  const px=paddle.x-paddle.w/2,py=PADDLE_CY-PADDLE_H/2;
  glow(color,18);ctx.fillStyle=color;
  roundRect(px,py,paddle.w,PADDLE_H,6);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.3)';
  roundRect(px+4,py+2,paddle.w-8,4,3);ctx.fill();
  noGlow();
}

function drawBalls(){
  balls.forEach(ball=>{
    const lc=LEVEL_CLR[level-1];
    const color=ball.fire?'#ff6600':lc;
    glow(color,ball.fire?24:18);ctx.fillStyle=color;
    ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fill();
    noGlow();
    ctx.fillStyle='rgba(255,255,255,0.9)';
    ctx.beginPath();ctx.arc(ball.x-ball.r*0.3,ball.y-ball.r*0.3,ball.r*0.3,0,Math.PI*2);ctx.fill();
  });
}

// ── Power-up items ────────────────────────────────────────────────────────
function drawPowerups(){
  powerups.forEach(pu=>{
    if(!pu.alive)return;
    const color=PU_CLR[pu.type];
    const pw=34,ph=16;
    glow(color,10);
    ctx.fillStyle=color+'33';ctx.strokeStyle=color;ctx.lineWidth=1.5;
    roundRect(pu.x-pw/2,pu.y-ph/2,pw,ph,4);ctx.fill();ctx.stroke();
    noGlow();
    ctx.font='bold 8px "Courier New"';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='#ffffff';ctx.fillText(PU_LBL[pu.type],pu.x,pu.y);
    ctx.textBaseline='alphabetic';
  });
}

function drawParticles(){
  particles.forEach(p=>{
    ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,Math.max(0.1,p.r),0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;
}

function drawProblem(){
  ctx.fillStyle='rgba(0,0,30,0.92)';ctx.fillRect(0,H-62,W,62);
  const lc=LEVEL_CLR[level-1];
  ctx.strokeStyle=lc;ctx.lineWidth=1;
  glow(lc,5);ctx.beginPath();ctx.moveTo(0,H-62);ctx.lineTo(W,H-62);ctx.stroke();noGlow();
  const txt=problem.text;
  let fsize=17;if(txt.length>38)fsize=14;if(txt.length>50)fsize=12;
  ctx.font=`bold ${fsize}px "Courier New"`;ctx.textAlign='center';
  ctx.fillStyle='#ffffff';glow('#ffffff',5);ctx.fillText(txt,W/2,H-38);noGlow();
  ctx.font='11px "Courier New"';ctx.fillStyle='#556677';
  ctx.fillText('Colpisci il mattoncino con la risposta giusta!',W/2,H-16);
}

function drawScreenFlash(){
  if(screenFlash>0){ctx.fillStyle=`rgba(255,255,255,${screenFlash/35})`;ctx.fillRect(0,0,W,H);}
}

// ── Overlay helpers ───────────────────────────────────────────────────────
function blink(){return Math.floor(Date.now()/520)%2===0;}

function drawHighScores(cx,y){
  const scores=loadScores();
  ctx.textAlign='center';ctx.font='bold 13px "Courier New"';
  glow('#ffdd00',8);ctx.fillStyle='#ffdd00';
  ctx.fillText('── CLASSIFICA TOP 5 ──',cx,y);noGlow();
  if(scores.length===0){
    ctx.font='12px "Courier New"';ctx.fillStyle='#445566';
    ctx.fillText('Nessun punteggio ancora',cx,y+20);
  }else{
    const medal=['#ffdd00','#cccccc','#cc8844','#aaaaaa','#888888'];
    scores.slice(0,5).forEach((s,i)=>{
      ctx.font='bold 12px "Courier New"';ctx.textAlign='left';
      glow(medal[i],4);ctx.fillStyle=medal[i];
      const line=`${i+1}. ${s.name.padEnd(10)} ${s.score}`;
      ctx.fillText(line,cx-140,y+20+i*18);noGlow();
    });
  }
}

// ── Screens ───────────────────────────────────────────────────────────────
function drawMenu(){
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);drawGrid();
  ctx.textAlign='center';
  ctx.font='bold 52px "Courier New"';
  glow('#00ffff',30);ctx.fillStyle='#00ffff';ctx.fillText('MATH',W/2,105);
  glow('#ff00ff',30);ctx.fillStyle='#ff00ff';ctx.fillText('ARKANOID',W/2,165);
  noGlow();

  // Difficulty buttons
  ctx.font='bold 13px "Courier New"';ctx.fillStyle='#aaaaaa';
  ctx.fillText('Seleziona difficoltà:',W/2,198);
  const diffs=['facile','medio','difficile'];
  diffs.forEach((d,i)=>{
    const cfg=DIFF[d],sel=difficulty===d;
    const bx=90+i*145,by=208,bw=118,bh=32;
    if(sel){glow(cfg.color,14);ctx.fillStyle=cfg.color+'33';}
    else{ctx.fillStyle='rgba(255,255,255,0.04)';ctx.shadowBlur=0;}
    roundRect(bx-bw/2,by,bw,bh,6);ctx.fill();
    ctx.strokeStyle=sel?cfg.color:'#334455';ctx.lineWidth=sel?2:1;
    roundRect(bx-bw/2,by,bw,bh,6);ctx.stroke();noGlow();
    ctx.font=`bold ${sel?14:12}px "Courier New"`;
    ctx.fillStyle=sel?cfg.color:'#556677';ctx.textAlign='center';
    ctx.fillText(cfg.label,bx,by+bh/2+5);
  });

  const lines=[
    {t:'LV1─Equazioni lineari   LV2─Quadratiche', c:'#778899',f:'11px'},
    {t:'LV3─Disequazioni        LV4─Sistemi',     c:'#778899',f:'11px'},
    {t:'',c:'',f:'11px'},
    {t:'★ Mattoncino dorato = risposta corretta',  c:'#ffcc44',f:'11px'},
    {t:'[2] = 2 colpi per distruggere  ★ = bonus', c:'#aaaaaa',f:'11px'},
    {t:'Power-up cadono dai mattoncini corretti',   c:'#aaaaaa',f:'11px'},
    {t:'← → o mouse per la racchetta   P = pausa', c:'#778899',f:'11px'},
  ];
  let y=260;
  lines.forEach(l=>{
    ctx.font=`${l.f} "Courier New"`;ctx.fillStyle=l.c;ctx.textAlign='center';
    if(l.t)ctx.fillText(l.t,W/2,y);y+=18;
  });

  drawHighScores(W/2,396);

  if(blink()){
    ctx.font='bold 18px "Courier New"';
    glow('#00ffff',12);ctx.fillStyle='#00ffff';
    ctx.fillText('[ SPAZIO o CLICK per iniziare ]',W/2,674);
    noGlow();
  }
}

function drawPause(){
  ctx.fillStyle='rgba(0,0,0,0.72)';ctx.fillRect(0,0,W,H);
  const pw=280,ph=200,px=(W-pw)/2,py=(H-ph)/2;
  ctx.fillStyle='rgba(0,8,28,0.97)';roundRect(px,py,pw,ph,12);ctx.fill();
  glow('#00ffff',12);ctx.strokeStyle='#00ffff';ctx.lineWidth=2;
  roundRect(px,py,pw,ph,12);ctx.stroke();noGlow();
  ctx.textAlign='center';ctx.font='bold 30px "Courier New"';
  glow('#ffff00',15);ctx.fillStyle='#ffff00';ctx.fillText('PAUSA',W/2,py+52);noGlow();

  const btns=[
    {label:'▶  RIPRENDI',color:'#00ff80',y:py+100},
    {label:'✕  ESCI AL MENU', color:'#ff4444',y:py+148},
  ];
  btns.forEach(btn=>{
    const bw=210,bh=34,bx=(W-bw)/2;
    ctx.fillStyle=btn.color+'22';roundRect(bx,btn.y,bw,bh,6);ctx.fill();
    glow(btn.color,6);ctx.strokeStyle=btn.color;ctx.lineWidth=1.5;
    roundRect(bx,btn.y,bw,bh,6);ctx.stroke();noGlow();
    ctx.font='bold 14px "Courier New"';ctx.fillStyle=btn.color;
    ctx.fillText(btn.label,W/2,btn.y+bh/2+5);
  });
  ctx.font='10px "Courier New"';ctx.fillStyle='#445566';
  ctx.fillText('[R] Riprendi  [M/Esc] Menu',W/2,py+ph-12);
}

function drawOverlay(title,titleColor,lines,action){
  ctx.fillStyle='rgba(0,0,0,0.88)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';ctx.font='bold 40px "Courier New"';
  glow(titleColor,25);ctx.fillStyle=titleColor;ctx.fillText(title,W/2,130);noGlow();
  ctx.font='18px "Courier New"';ctx.fillStyle='#cccccc';
  lines.forEach((l,i)=>ctx.fillText(l,W/2,180+i*30));
  drawHighScores(W/2,290);
  if(blink()){
    ctx.font='bold 16px "Courier New"';
    glow('#00ffff',10);ctx.fillStyle='#00ffff';
    ctx.fillText(action,W/2,H-28);noGlow();
  }
}

function drawLevelWin(){
  drawOverlay('★ LIVELLO COMPLETATO! ★','#ffff00',
    [`Punteggio: ${score}`,`Livello ${level} superato!`],
    '[ SPAZIO ] ─ Prossimo livello');
}

function drawVictory(){
  ctx.fillStyle='rgba(0,0,0,0.9)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';ctx.font='bold 44px "Courier New"';
  glow('#ffff00',30);ctx.fillStyle='#ffff00';ctx.fillText('HAI VINTO!!!',W/2,120);noGlow();
  ctx.font='bold 22px "Courier New"';
  ['Complimenti, matematico!',`Punteggio finale: ${score}`,'Tutti i 4 livelli completati!'].forEach((l,i)=>{
    const c=LEVEL_CLR[i%4];glow(c,8);ctx.fillStyle=c;ctx.fillText(l,W/2,170+i*32);
  });noGlow();
  drawHighScores(W/2,295);
  if(blink()){
    ctx.font='bold 16px "Courier New"';glow('#fff',5);ctx.fillStyle='#fff';
    ctx.fillText('[ SPAZIO ] ─ Ricomincia',W/2,H-28);noGlow();
  }
}

function drawGameOver(){
  drawOverlay('GAME OVER','#ff2222',
    [`Punteggio: ${score}`,`Livello: ${level}`],
    '[ SPAZIO ] ─ Riprova');
}

function drawNameEntry(){
  ctx.fillStyle='rgba(0,0,0,0.92)';ctx.fillRect(0,0,W,H);drawGrid();
  ctx.textAlign='center';ctx.font='bold 26px "Courier New"';
  glow('#ffdd00',20);ctx.fillStyle='#ffdd00';ctx.fillText('NUOVO RECORD!',W/2,180);noGlow();
  ctx.font='18px "Courier New"';ctx.fillStyle='#aaaaaa';ctx.fillText(`Punteggio: ${score}`,W/2,218);
  ctx.font='13px "Courier New"';ctx.fillStyle='#778899';ctx.fillText('Inserisci il tuo nome:',W/2,255);
  const bw=260,bh=42,bx=(W-bw)/2,by=268;
  ctx.fillStyle='rgba(0,20,50,0.9)';roundRect(bx,by,bw,bh,8);ctx.fill();
  glow('#00ffff',10);ctx.strokeStyle='#00ffff';ctx.lineWidth=2;
  roundRect(bx,by,bw,bh,8);ctx.stroke();noGlow();
  ctx.font='bold 18px "Courier New"';ctx.fillStyle='#ffffff';
  ctx.fillText(nameInput+(blink()?'|':' '),W/2,by+bh/2+6);
  ctx.font='12px "Courier New"';ctx.fillStyle='#556677';
  ctx.fillText('[INVIO] Conferma  [ESC] Salta',W/2,338);
}

// ── Main draw ─────────────────────────────────────────────────────────────
function draw(){
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  if(gs==='menu')     {drawMenu();return;}
  if(gs==='nameentry'){drawNameEntry();return;}
  if(gs==='gameover') {drawGameOver();return;}
  if(gs==='victory')  {drawVictory();return;}

  drawGrid();drawHUD();drawBricks();drawBalls();drawPaddle();
  drawPowerups();drawParticles();drawProblem();drawScreenFlash();

  if(gs==='levelwin')drawLevelWin();
  if(gs==='paused')  drawPause();
}

// ── Game management ───────────────────────────────────────────────────────
function startGame(){
  score=0;lives=3;level=1;
  fx={widePaddle:0,slowBall:0,fireball:0};
  powerups=[];startLevel();
}
function startLevel(){
  flashBricks={};particles=[];powerups=[];
  fx={widePaddle:0,slowBall:0,fireball:0};
  initBricks();initBall();initPaddle();genProblem();
  gs='playing';
}
function nextLevel(){
  if(level>=4){triggerEnd('victory');}
  else{level++;startLevel();}
}

// ── Input ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  keys[e.key]=true;

  // Name entry
  if(gs==='nameentry'){
    if(e.key==='Enter'){addScore(nameInput,score);gs=prevGS;}
    else if(e.key==='Escape'){gs=prevGS;}
    else if(e.key==='Backspace'){nameInput=nameInput.slice(0,-1);}
    else if(e.key.length===1&&nameInput.length<12){nameInput+=e.key.toUpperCase();}
    e.preventDefault();return;
  }

  // Pause toggle
  if(e.key==='p'||e.key==='P'){
    if(gs==='playing'){gs='paused';}
    else if(gs==='paused'){gs='playing';}
    e.preventDefault();return;
  }
  // Pause menu actions
  if(gs==='paused'){
    if(e.key==='r'||e.key==='R')gs='playing';
    if(e.key==='m'||e.key==='M'||e.key==='Escape')gs='menu';
    e.preventDefault();return;
  }

  if(e.key===' '){
    if(gs==='menu'||gs==='gameover')startGame();
    else if(gs==='levelwin')nextLevel();
    else if(gs==='victory')startGame();
    e.preventDefault();
  }
  if(['ArrowLeft','ArrowRight'].includes(e.key))e.preventDefault();
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  mouseX=(e.clientX-r.left)*(W/r.width);
});

canvas.addEventListener('click',e=>{
  const r=canvas.getBoundingClientRect();
  const cx=(e.clientX-r.left)*(W/r.width);
  const cy=(e.clientY-r.top)*(H/r.height);

  if(gs==='menu'){
    // Check difficulty buttons
    const diffs=['facile','medio','difficile'];
    let diffHit=false;
    diffs.forEach((d,i)=>{
      const bx=90+i*145,by=208,bw=118,bh=32;
      if(cx>=bx-bw/2&&cx<=bx+bw/2&&cy>=by&&cy<=by+bh){difficulty=d;diffHit=true;}
    });
    if(!diffHit)startGame();
    return;
  }
  if(gs==='paused'){
    const pw=280,ph=200,pyO=(H-ph)/2;
    const bw=210,bx=(W-bw)/2;
    if(cx>=bx&&cx<=bx+bw){
      if(cy>=pyO+100&&cy<=pyO+134)gs='playing';
      if(cy>=pyO+148&&cy<=pyO+182)gs='menu';
    }
    return;
  }
  if(gs==='gameover'||gs==='menu')startGame();
  else if(gs==='levelwin')nextLevel();
  else if(gs==='victory')startGame();
});

// ── Touch ─────────────────────────────────────────────────────────────────
function getTouchX(e){const r=canvas.getBoundingClientRect();return(e.touches[0].clientX-r.left)*(W/r.width);}
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();mouseX=getTouchX(e);
  if(gs==='menu'||gs==='gameover')startGame();
  else if(gs==='levelwin')nextLevel();
  else if(gs==='victory')startGame();
},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();mouseX=getTouchX(e);},{passive:false});

// ── Loop ──────────────────────────────────────────────────────────────────
function loop(ts){update();draw();requestAnimationFrame(loop);}
requestAnimationFrame(loop);
</script>
